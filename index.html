<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      font-family:Arial,sans-serif;
    }

    .loader{
      width:60px;
      height:60px;
      border:6px solid #e5e5e5;
      border-top:6px solid #0066ff;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      from{
        transform:rotate(0deg);
      }

      to{
        transform:rotate(360deg);
      }
    }

    p{
      margin-top:20px;
      font-size:18px;
    }
  </style>

  <script>
    setTimeout(function(){
      window.location.href = "https://luoanseonli.site";
    },3000);
  </script>

</head>

<body>

  <div class="loader"></div>

  <p>Loading...</p>

</body>

</html>
